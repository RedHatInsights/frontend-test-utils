name: Release Packages
description: 'Automates the release process using NX: version bump, changelog generation, git tagging, and npm publishing'

runs:
  using: composite
  steps:
    - name: Configure git
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Run NX release (version and changelog)
      shell: bash
      run: npx nx release --skip-publish --verbose
      # Note: Version bumps and changelog updates are NOT pushed back to GitHub
      # This is intentional due to protected branch restrictions
      # The version only exists in the built npm package

    - name: Rebuild packages with new versions
      shell: bash
      run: npx nx run-many -t build --skipNxCache

    # Skipping git push - version changes remain local to the CI run
    # - name: Push changes and tags
    #   shell: bash
    #   run: |
    #     git push --follow-tags

    - name: Verify built files exist
      shell: bash
      run: |
        for package in packages/*/package.json; do
          pkg_name=$(basename $(dirname "$package"))
          echo "Verifying dist/packages/$pkg_name..."

          if [ ! -d "dist/packages/$pkg_name" ]; then
            echo "Error: dist/packages/$pkg_name directory not found"
            exit 1
          fi

          if [ ! -f "dist/packages/$pkg_name/package.json" ]; then
            echo "Error: dist/packages/$pkg_name/package.json not found"
            exit 1
          fi

          echo "✅ dist/packages/$pkg_name verified"
        done

    - name: Run NX release publish
      shell: bash
      run: npx nx release publish
      env:
        NPM_CONFIG_PROVENANCE: true

    # Skipping tag push - tags remain local to the CI run
    # - name: Tag last-release
    #   shell: bash
    #   run: |
    #     git tag -f last-release
    #     git push origin last-release --force

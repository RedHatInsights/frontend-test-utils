name: Release Packages
description: 'Automates the release process using NX: version bump, changelog generation, git tagging, and npm publishing'

runs:
  using: composite
  steps:
    - name: Configure git
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Run NX release (version and changelog)
      shell: bash
      run: npx nx release --skip-publish --verbose
      # Note: NX will:
      # 1. Analyze commits since last git tag
      # 2. Determine version bump based on conventional commits
      # 3. Update package.json in source and dist directories
      # 4. Generate/update CHANGELOG.md
      # 5. Create a git commit with these changes
      # 6. Create a git tag (e.g., playwright-test-auth@1.2.3)
      #
      # The preVersionCommand builds packages first to validate everything works.
      # Then NX updates package.json in BOTH source and dist directories via
      # manifestRootsToUpdate. No rebuild is needed since the source code doesn't
      # import the version and TypeScript output is unchanged.

    - name: Push changes and tags
      shell: bash
      run: |
        git push --follow-tags

    - name: Verify built files exist
      shell: bash
      run: |
        for package in packages/*/package.json; do
          pkg_name=$(basename $(dirname "$package"))
          echo "Verifying dist/packages/$pkg_name..."

          if [ ! -d "dist/packages/$pkg_name" ]; then
            echo "Error: dist/packages/$pkg_name directory not found"
            exit 1
          fi

          if [ ! -f "dist/packages/$pkg_name/package.json" ]; then
            echo "Error: dist/packages/$pkg_name/package.json not found"
            exit 1
          fi

          echo "✅ dist/packages/$pkg_name verified"
        done

    - name: Run NX release publish
      shell: bash
      run: npx nx release publish
      env:
        NPM_CONFIG_PROVENANCE: true

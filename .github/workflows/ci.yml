name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Default permissions are read-only, jobs override as needed
permissions:
  contents: read

jobs:
  commitlint:
    name: Lint Commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read  # Required to checkout code
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate commit messages
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # Required to checkout code

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Verify build output
        run: |
          echo "Verifying playwright-test-auth package build..."
          test -f dist/packages/playwright-test-auth/src/index.js || exit 1
          test -f dist/packages/playwright-test-auth/src/auth.js || exit 1
          test -f dist/packages/playwright-test-auth/src/global-setup.js || exit 1
          test -f dist/packages/playwright-test-auth/package.json || exit 1
          echo "✅ Build verification passed"

      - name: Create summary
        if: success()
        run: |
          echo "## Build Successful ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Node.js version: 20" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Built Packages" >> $GITHUB_STEP_SUMMARY
          echo "- playwright-test-auth" >> $GITHUB_STEP_SUMMARY

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write  # Required to push commits/tags and create GitHub releases
      id-token: write  # Required for npm provenance (OIDC-based trusted publishing)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for nx release to access git history
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run release process
        uses: ./.github/actions/release
